<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASTEL 2503</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
padding-bottom:180px;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.logo{
width:120px;
border-radius:16px;
margin-bottom:10px;
}

h1{font-size:2.3rem;}
.subtitle{color:#aaa;margin-top:8px;}

/* NAV */
.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:25px;
}

.nav button{
background:#181818;
border:1px solid #333;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.nav button:hover{
background:#F7B7C3;
color:black;
}

/* CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:20px;
}

/* CARDS */
.card{
display:none;
background:#181818;
border:1px solid #242424;
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.card.active{
display:block;
}

h2{margin-bottom:10px;}
p{color:#aaa;}

/* OPTIONS */
.option{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}

input[type=checkbox]{
transform:scale(1.2);
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#0f0f0f;
color:white;
}

/* TOTAL */
.total{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f0f0f;
border-top:1px solid #222;
padding:18px;
text-align:center;
}

.total-price{
font-size:2rem;
color:#F7B7C3;
font-weight:bold;
margin-top:5px;
}

.whatsapp{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-decoration:none;
padding:14px;
border-radius:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="hero">
<img class="logo" src="logo.png">
<h1>PASTEL 2503</h1>
<p class="subtitle">Production Audiovisuelle • Paris</p>

<div class="nav">
<button onclick="showService('reels')">Reels</button>
<button onclick="showService('street')">Street Clip</button>
<button onclick="showService('clip')">Clip Premium</button>
<button onclick="showService('captation')">Devis</button>
</div>
</div>

<div class="container">

<!-- REELS -->
<div id="reels" class="card">
<h2>Reels</h2>

<select id="service" onchange="updatePrice()">
<option value="200">1 Reel — 200€</option>
<option value="300">2 Reels — 300€</option>
<option value="400">3 Reels — 400€</option>
<option value="500">4 Reels — 500€</option>
<option value="600">5 Reels — 600€</option>
</select>

<div class="option"><label>Sous-titres auto +25€</label><input type="checkbox" value="25" onchange="updatePrice()"></div>
<div class="option"><label>Sous-titres animés +50€</label><input type="checkbox" value="50" onchange="updatePrice()"></div>
</div>

<!-- STREET -->
<div id="street" class="card">
<h2>Street Clip — 500€</h2>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="updatePrice()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="updatePrice()"></div>
<div class="option"><label>VHS +120€</label><input type="checkbox" value="120" onchange="updatePrice()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="updatePrice()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="updatePrice()"></div>
</div>

<!-- CLIP PREMIUM -->
<div id="clip" class="card">
<h2>Clip Premium — 800€</h2>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="updatePrice()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="updatePrice()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="updatePrice()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="updatePrice()"></div>
</div>

<!-- CAPTATION + FORM -->
<div id="captation" class="card">
<h2>Votre projet</h2>

<input id="name" placeholder="Nom / Société">
<input id="contact" placeholder="Instagram / Email">
<input id="date" placeholder="Date du projet">
<input id="message" placeholder="Message (optionnel)">
</div>

</div>

<!-- TOTAL -->
<div class="total">

<div>Total estimatif</div>
<div class="total-price" id="total">200€</div>

<a id="whatsapp" class="whatsapp" target="_blank">
Recevoir mon devis
</a>

</div>

<script>

function showService(id){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("active");
});

document.getElementById(id).classList.add("active");

updatePrice();
}

function updatePrice(){

let total = 0;

let active = document.querySelector(".card.active");

if(active && active.querySelector("#service")){
total += parseInt(active.querySelector("#service").value);
}

document.querySelectorAll(".card.active input[type=checkbox]").forEach(c=>{
if(c.checked) total += parseInt(c.value);
});

document.getElementById("total").innerText = total + "€";

let name = document.getElementById("name").value || "";
let contact = document.getElementById("contact").value || "";
let date = document.getElementById("date").value || "";
let message = document.getElementById("message").value || "";

let text =
`Bonjour PASTEL 2503

Service sélectionné

Nom: ${name}
Contact: ${contact}
Date: ${date}

Message:
${message}

Montant estimatif: ${total}€`;

document.getElementById("whatsapp").href =
`https://wa.me/33759379324?text=${encodeURIComponent(text)}`;
}

showService("reels");

</script>

</body>
</html>
