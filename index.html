<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASTEL 2503</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#141018,#0d0d0d);
color:white;
padding-bottom:200px;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.logo{
width:120px;
border-radius:16px;
margin-bottom:12px;
box-shadow:0 10px 35px rgba(247,183,195,0.15);
}

h1{
font-size:2.4rem;
letter-spacing:1px;
}

.subtitle{
color:#cfcfcf;
margin-top:8px;
}

/* NAV */
.nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:25px;
}

.nav button{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
color:white;
padding:10px 14px;
border-radius:14px;
cursor:pointer;
transition:0.25s;
backdrop-filter: blur(10px);
font-weight:bold;
}

.nav button:hover{
background:#F7B7C3;
color:black;
transform:translateY(-2px);
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.5s ease;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:20px;
margin-bottom:20px;
backdrop-filter: blur(12px);
}

.card.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* TITRES */
h2{
margin-bottom:10px;
color:#F7B7C3;
}

p{
color:#cfcfcf;
margin-bottom:10px;
}

/* IMAGES */
.service-img{
width:100%;
border-radius:14px;
margin-bottom:15px;
opacity:0.95;
}

/* OPTIONS (ALIGNEMENT CLEAN) */
.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 12px;
margin-top:8px;
border-radius:12px;
background:rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.06);
transition:0.2s;
}

.option:hover{
border-color:rgba(247,183,195,0.4);
transform:translateX(3px);
}

.option label{
flex:1;
}

/* CHECKBOX */
input[type=checkbox]{
transform:scale(1.25);
accent-color:#F7B7C3;
}

/* SELECT */
select{
width:100%;
padding:12px;
border-radius:12px;
background:rgba(0,0,0,0.3);
color:white;
border:1px solid rgba(255,255,255,0.1);
margin-top:10px;
}

/* FORM */
input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.3);
color:white;
}

input:focus{
border-color:#F7B7C3;
outline:none;
}

/* TOTAL */
.total{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(10,10,10,0.85);
backdrop-filter: blur(12px);
border-top:1px solid rgba(255,255,255,0.1);
padding:18px;
text-align:center;
}

.total-price{
font-size:2rem;
color:#F7B7C3;
font-weight:bold;
margin-top:5px;
}

.whatsapp{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-decoration:none;
padding:14px;
border-radius:14px;
font-weight:bold;
transition:0.2s;
}

.whatsapp:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<img class="logo" src="logo.png">
<h1>PASTEL 2503</h1>
<p class="subtitle">Production Audiovisuelle • Paris</p>

<div class="nav">
<button onclick="show('reels')">Reels</button>
<button onclick="show('street')">Street Clip</button>
<button onclick="show('premium')">Clip Premium</button>
<button onclick="show('form')">Devis</button>
</div>
</div>

<div class="container">

<!-- REELS -->
<div id="reels" class="card active">
<h2>Reels — Contenu court</h2>

<select onchange="update()">
<option value="200">1 Reel — 200€</option>
<option value="300">2 Reels — 300€</option>
<option value="400">3 Reels — 400€</option>
<option value="500">4 Reels — 500€</option>
<option value="600">5 Reels — 600€</option>
</select>

<div class="option"><label>Sous-titres auto +25€</label><input type="checkbox" value="25" onchange="update()"></div>
<div class="option"><label>Sous-titres animés +50€</label><input type="checkbox" value="50" onchange="update()"></div>
</div>

<!-- STREET -->
<div id="street" class="card">
<img class="service-img" src="https://i.imgur.com/yourstreet.jpg">

<h2>Street Clip — 500€</h2>
<p>6h tournage • FX3 • multi-lieux Paris</p>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="update()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="update()"></div>
<div class="option"><label>VHS +120€</label><input type="checkbox" value="120" onchange="update()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="update()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="update()"></div>
</div>

<!-- PREMIUM -->
<div id="premium" class="card">
<img class="service-img" src="https://i.imgur.com/yourpremium.jpg">

<h2>Clip Premium — 800€</h2>
<p>Storyboard • 8h tournage • 4K cinematic</p>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="update()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="update()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="update()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="update()"></div>
<div class="option"><label>VHS intégration +120€</label><input type="checkbox" value="120" onchange="update()"></div>
</div>

<!-- FORM -->
<div id="form" class="card">
<h2>Votre demande</h2>

<input id="name" placeholder="Nom / Société">
<input id="contact" placeholder="Instagram / Email">
<input id="date" placeholder="Date du projet">
<input id="message" placeholder="Message">
</div>

</div>

<!-- TOTAL -->
<div class="total">

<div>Total estimatif</div>
<div class="total-price" id="total">200€</div>

<a id="wa" class="whatsapp" target="_blank">
Recevoir mon devis
</a>

</div>

<script>

function show(id){
document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("active");
});
document.getElementById(id).classList.add("active");
update();
}

function update(){

let active = document.querySelector(".card.active");
let total = 0;

// select price
let select = active.querySelector("select");
if(select){
total += parseInt(select.value);
}

// checkboxes
active.querySelectorAll("input[type=checkbox]").forEach(c=>{
if(c.checked) total += parseInt(c.value);
});

// total display
document.getElementById("total").innerText = total + "€";

// form
let text =
`PASTEL 2503

Nom: ${name.value}
Contact: ${contact.value}
Date: ${date.value}
Message: ${message.value}

Total: ${total}€`;

// whatsapp
document.getElementById("wa").href =
`https://wa.me/33759379324?text=${encodeURIComponent(text)}`;
}

update();

</script>

</body>
</html>
