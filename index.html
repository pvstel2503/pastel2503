<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASTEL 2503</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,#1a1a1a,#0d0d0d);
color:white;
padding-bottom:200px;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.logo{
width:120px;
border-radius:16px;
margin-bottom:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
font-size:2.4rem;
letter-spacing:1px;
}

.subtitle{
color:#aaa;
margin-top:8px;
}

/* NAV */
.nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:25px;
}

.nav button{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:white;
padding:10px 14px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
transition:0.25s;
backdrop-filter: blur(10px);
}

.nav button:hover{
background:#F7B7C3;
color:black;
transform:translateY(-2px);
}

/* CONTAINER */
.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* CARDS GLASS */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:22px;
margin-bottom:20px;
backdrop-filter: blur(12px);
opacity:0;
transform:translateY(20px);
animation:fadeIn 0.6s forwards;
}

.card:nth-child(1){animation-delay:0.1s}
.card:nth-child(2){animation-delay:0.2s}
.card:nth-child(3){animation-delay:0.3s}
.card:nth-child(4){animation-delay:0.4s}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:10px;
}

p{
color:#aaa;
line-height:1.4;
}

/* OPTIONS */
.option{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
}

input[type=checkbox]{
transform:scale(1.2);
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.3);
color:white;
outline:none;
}

input:focus{
border-color:#F7B7C3;
}

/* TOTAL BAR */
.total{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(10,10,10,0.85);
backdrop-filter: blur(12px);
border-top:1px solid rgba(255,255,255,0.1);
padding:18px;
text-align:center;
}

.total-price{
font-size:2rem;
color:#F7B7C3;
font-weight:bold;
margin-top:5px;
}

.whatsapp{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-decoration:none;
padding:14px;
border-radius:14px;
font-weight:bold;
transition:0.2s;
}

.whatsapp:hover{
transform:scale(1.03);
}

/* SMOOTH SCROLL OFFSET */
html{
scroll-behavior:smooth;
scroll-padding-top:80px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<img class="logo" src="logo.png">
<h1>PASTEL 2503</h1>
<p class="subtitle">Production Audiovisuelle • Paris</p>

<div class="nav">
<button onclick="go('reels')">Reels</button>
<button onclick="go('street')">Street Clip</button>
<button onclick="go('clip')">Clip Musical</button>
<button onclick="go('form')">Devis</button>
</div>
</div>

<div class="container">

<!-- REELS -->
<div id="reels" class="card">
<h2>Reels</h2>
<p>Contenu court optimisé réseaux</p>

<select id="service" onchange="updatePrice()">
<option value="200">1 Reel — 200€</option>
<option value="300">2 Reels — 300€</option>
<option value="400">3 Reels — 400€</option>
<option value="500">4 Reels — 500€</option>
<option value="600">5 Reels — 600€</option>
</select>

<div class="option"><label>Sous-titres auto (+25€)</label><input type="checkbox" value="25" onchange="updatePrice()"></div>
<div class="option"><label>Sous-titres animés (+50€)</label><input type="checkbox" value="50" onchange="updatePrice()"></div>
</div>

<!-- STREET -->
<div id="street" class="card">
<h2>Street Clip — 500€</h2>
<p>Tournage multi-lieux Paris • FX3</p>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="updatePrice()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="updatePrice()"></div>
<div class="option"><label>VHS +120€</label><input type="checkbox" value="120" onchange="updatePrice()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="updatePrice()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="updatePrice()"></div>
</div>

<!-- CLIP -->
<div id="clip" class="card">
<h2>Clip Musical — 800€</h2>
<p>Production complète 4K • storyboard</p>

<div class="option"><label>2 reels +80€</label><input type="checkbox" value="80" onchange="updatePrice()"></div>
<div class="option"><label>4 reels +140€</label><input type="checkbox" value="140" onchange="updatePrice()"></div>
<div class="option"><label>FX avancés +200€</label><input type="checkbox" value="200" onchange="updatePrice()"></div>
<div class="option"><label>Drone +150€</label><input type="checkbox" value="150" onchange="updatePrice()"></div>
</div>

<!-- FORM -->
<div id="form" class="card">
<h2>Votre projet</h2>

<input id="name" placeholder="Nom / Société">
<input id="contact" placeholder="Instagram / Email">
<input id="date" placeholder="Date du projet">
<input id="message" placeholder="Message (optionnel)">
</div>

</div>

<!-- TOTAL -->
<div class="total">

<div>Total estimatif</div>
<div class="total-price" id="total">200€</div>

<a id="whatsapp" class="whatsapp" target="_blank">
Recevoir mon devis
</a>

</div>

<script>

function go(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function updatePrice(){

let total = parseInt(document.getElementById("service").value);

document.querySelectorAll("input[type=checkbox]").forEach(c=>{
if(c.checked) total += parseInt(c.value);
});

document.getElementById("total").innerText = total + "€";

let name = document.getElementById("name").value;
let contact = document.getElementById("contact").value;
let date = document.getElementById("date").value;
let message = document.getElementById("message").value;

let text =
`Bonjour PASTEL 2503

Nom: ${name}
Contact: ${contact}
Date: ${date}

Message:
${message}

Montant estimatif: ${total}€`;

document.getElementById("whatsapp").href =
`https://wa.me/33759379324?text=${encodeURIComponent(text)}`;
}

updatePrice();

</script>

</body>
</html>
